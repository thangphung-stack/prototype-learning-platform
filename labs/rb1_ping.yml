name: rb1_ping

topology:
  nodes:
    h1:
      kind: linux
      image: wbitt/network-multitool:latest
      memory: 256Mb
      exec:
        - ip link set eth1 up

    h2:
      kind: linux
      image: wbitt/network-multitool:latest
      memory: 256Mb
      exec:
        - ip link set eth1 up

  links:
    - endpoints: ["h1:eth1", "h2:eth1"]